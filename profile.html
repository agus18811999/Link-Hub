  <script>
    // MASUKKAN URL GOOGLE APPS SCRIPT WEB APP ANDA DI SINI
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyZOKBx_IVqtS0Vt0_XXh5GOY35llR9pzg-N6jTB_koX7DvHPbw9YcO7htZ0bzfWjhR/exec'; 

    let BLOCKS_DATA = [];

    document.addEventListener('DOMContentLoaded', () => {
      // Mengambil parameter username dari URL (Contoh: profile.html?u=business)
      const urlParams = new URLSearchParams(window.location.search);
      const username = urlParams.get('u');

      if (!username) {
        showErrorPage("Username tidak ditentukan.");
        return;
      }

      fetchUserProfile(username);
    });

    async function fetchUserProfile(username) {
      try {
        const payload = new URLSearchParams();
        payload.append('action', 'get_dashboard_data');
        payload.append('token', 'GUEST'); // Bypass token karena ini halaman publik
        payload.append('guestUsername', username); // Memberitahu backend username yang dicari

        // Note: Kita akan memanggil API get_dashboard_data dengan parameter username tamu
        const response = await fetch(`${SCRIPT_URL}?action=get_dashboard_data&u=${username}`);
        const res = await response.json();

        if (res.status === 'success') {
          BLOCKS_DATA = res.data.blocks;
          renderPublicProfile(res.data);
          document.getElementById('profileLoader').style.display = 'none';
        } else {
          throw new Error(res.message);
        }
      } catch (error) {
        showErrorPage("Halaman tidak ditemukan atau gagal memuat data.");
      }
    }
// (Letakkan fungsi ini di luar, atau di dalam script global)
      function formatRupiahProfile(angka) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
      }
// -> RENDER PROFIL PUBLIK (VERSI LENGKAP & INTEGRASI ANALYTICS)
    function renderPublicProfile(data) {
      const settings = data.pageSettings;
      const user = data.user;

      // Update Judul Halaman
      document.title = `${settings.Page_Title}`;

      // Update Teks & Bio
      document.getElementById('profileTitle').textContent = settings.Page_Title;
      document.getElementById('profileBio').textContent = settings.Bio_Description;

      // Update Foto Profil
      const avatarUrl = user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=random`;
      document.getElementById('profileAvatar').src = avatarUrl;

      // Update Latar Belakang (Solid / Gradasi)
      const mainContainer = document.getElementById('mainContainer');
      mainContainer.style.background = settings.Bg_Color;

      const isDarkBg = isColorDark(settings.Bg_Color);
      
      const titleColor = settings.Title_Color || (isDarkBg ? '#ffffff' : '#0f172a');
      const bioColor = settings.Bio_Color || (isDarkBg ? 'rgba(255,255,255,0.7)' : 'rgba(15,23,42,0.7)');

      document.getElementById('profileTitle').style.color = titleColor;
      document.getElementById('profileBio').style.color = bioColor;

      // Sinkronisasi Warna Search Bar & Ikon
      const searchInput = document.getElementById('searchInput');
      const searchIcon = document.getElementById('searchIcon');
      
      if (isDarkBg) {
        searchInput.className = "w-full bg-white/10 border border-white/10 rounded-2xl py-3.5 pl-11 pr-4 text-sm font-semibold text-white placeholder-white/50 focus:outline-none focus:ring-1 focus:ring-white/20 shadow-sm";
        searchIcon.className = "absolute left-4 top-1/2 -translate-y-1/2 flex items-center justify-center pointer-events-none text-white/50";
      } else {
        searchInput.className = "w-full bg-black/5 border border-black/10 rounded-2xl py-3.5 pl-11 pr-4 text-sm font-semibold text-slate-800 placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-black/20 shadow-sm";
        searchIcon.className = "absolute left-4 top-1/2 -translate-y-1/2 flex items-center justify-center pointer-events-none text-slate-500";
      }

      // Sinkronisasi Warna Branding Footer
      const footerBranding = document.getElementById('footerBranding');
      if (footerBranding) {
        footerBranding.style.color = isDarkBg ? 'rgba(255, 255, 255, 0.4)' : 'rgba(15, 23, 42, 0.4)';
      }

      // Load Google Fonts secara dinamis
      if (settings.Font_Family) {
        loadGoogleFont(settings.Font_Family);
        mainContainer.style.fontFamily = `"${settings.Font_Family}", sans-serif`;
      }

      // Rendering Glassmorphism Link Cards
      const container = document.getElementById('linksContainer');
      container.innerHTML = '';

      const cardTextColor = isDarkBg ? '#ffffff' : '#0f172a';
      const cardDescColor = isDarkBg ? 'rgba(255,255,255,0.6)' : 'rgba(15,23,42,0.6)';

      BLOCKS_DATA.forEach(block => {
        if (!block.Is_Active) return;

        const card = document.createElement('a');
        card.href = block.URL_Destination;
        card.target = "_blank";
        
        // SANGAT PENTING: Menambahkan kembali fungsi pelacak klik yang sempat terhapus
        // GANTI MENJADI (Native JS Binding):
card.onclick = (e) => {
  recordClick(user.id || '', block.Block_ID);
};
        card.className = `w-full flex items-center gap-4 p-3.5 border backdrop-blur-md shadow-sm transition-transform hover:scale-[1.015] active:scale-[0.985] group ${settings.Button_Style || 'rounded-full'}`;
        
        if (isDarkBg) {
          card.style.backgroundColor = 'rgba(255, 255, 255, 0.08)';
          card.style.borderColor = 'rgba(255, 255, 255, 0.12)';
        } else {
          card.style.backgroundColor = 'rgba(255, 255, 255, 0.6)';
          card.style.borderColor = 'rgba(255, 255, 255, 0.8)';
        }

        const imgUrl = block.Thumbnail_URL || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=100';

        card.innerHTML = `
          <img src="${imgUrl}" class="w-12 h-12 rounded-xl object-cover border border-white/20 shadow-sm shrink-0">
          <div class="flex-1 min-w-0 text-left">
            <h4 class="font-bold text-[15.5px] tracking-tight truncate" style="color: ${cardTextColor};">${block.Title}</h4>
            <p class="text-[12.5px] mt-1 leading-normal line-clamp-2 font-semibold" style="color: ${cardDescColor};">${block.Description || ''}</p>
          </div>
          <i class="fa-solid fa-chevron-right text-[11px] group-hover:translate-x-0.5 transition-transform shrink-0" style="color: ${cardTextColor}; opacity: 0.5;"></i>
        `;

        container.appendChild(card);
      });
    
      // ========================================================
      // RENDERING KATALOG PRODUK DIGITAL (DI DALAM renderPublicProfile)
      // ========================================================
      // RENDERING FLOATING SOCIAL ICONS BAR
      // ========================================================
      const socialBar = document.getElementById('floatingSocialBar');
      const socialGlass = document.getElementById('socialBarGlass');
      socialGlass.innerHTML = ''; // Reset kontainer
      
      const socColor = settings.Social_Color || '#ffffff';
      let socialCount = 0;

      // Fungsi Helper Pembuat Ikon
      const createIcon = (url, iconClass) => {
        if (!url) return;
        socialCount++;
        const a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        // Animasi pantulan halus saat disentuh/diklik
        a.className = "flex items-center justify-center w-8 h-8 rounded-full hover:scale-110 active:scale-95 transition-transform duration-200";
        a.innerHTML = `<i class="fa-brands ${iconClass} text-[22px]" style="color: ${socColor}; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));"></i>`;
        socialGlass.appendChild(a);
      };

      // Buat ikon berdasarkan data dari database
      createIcon(settings.Social_Instagram, 'fa-instagram');
      createIcon(settings.Social_TikTok, 'fa-tiktok');
      createIcon(settings.Social_YouTube, 'fa-youtube');
      createIcon(settings.Social_Twitter, 'fa-twitter');
      createIcon(settings.Social_Facebook, 'fa-facebook');

      // Tampilkan bilah hanya jika minimal ada 1 link yang diisi
     if (socialCount > 0) {
          if (isDarkBg) {
            // Kaca gelap transparan super tipis
            socialGlass.style.backgroundColor = 'rgba(255, 255, 255, 0.07)';
            socialGlass.style.borderColor = 'rgba(255, 255, 255, 0.15)';
          } else {
            // Kaca terang transparan
            socialGlass.style.backgroundColor = 'rgba(255, 255, 255, 0.35)';
            socialGlass.style.borderColor = 'rgba(255, 255, 255, 0.6)';
          }
          socialBar.classList.remove('hidden');
        // Efek transisi masuk yang elegan (Slide Up & Fade In)
        setTimeout(() => {
          socialBar.classList.remove('translate-y-10', 'opacity-0');
          socialBar.classList.add('translate-y-0', 'opacity-100');
        }, 500);
      }
      // ========================================================
      // ========================================================
      // RENDERING ADVERTISING ENGINE (PROMO BANNERS)
      // ========================================================
      const topBanner = document.getElementById('topBannerContainer');
      const floatBanner = document.getElementById('floatingBannerContainer');
      const linksContainer = document.getElementById('linksContainer');

      topBanner.innerHTML = '';
      floatBanner.innerHTML = '';

      const BANNERS_DATA = data.banners || [];

      if (BANNERS_DATA.length > 0) {
        BANNERS_DATA.forEach(banner => {
          
          // A. KIRIM BEACON IMPRESI VIEW SECARA SENYAP (SILENT AD VIEWS LOG)
          const adBeacon = new Image();
          adBeacon.src = `${SCRIPT_URL}?action=log_banner_view&bannerId=${banner.Banner_ID}`;

          // B. JIKA PENEMPATAN ADALAH TOP HEADER (MELAYANG DI ATAS)
          if (banner.Position === 'Top_Header') {
            topBanner.className = "w-full max-w-[480px] mb-8 relative z-50 transition-all duration-300";
            topBanner.innerHTML = `
              <div class="relative w-full rounded-2xl overflow-hidden shadow-lg border border-white/10 group">
                <a href="${banner.Destination_URL}" target="_blank" onclick="recordClick('${user.id}', '${banner.Banner_ID}')">
                  <img src="${banner.Image_URL}" class="w-full h-auto object-cover transition-transform duration-500 group-hover:scale-[1.02]">
                </a>
                <!-- Tombol Silang Close (Dismissible Banner) -->
                <button onclick="document.getElementById('topBannerContainer').style.display='none'" class="absolute top-2 right-2 w-6 h-6 rounded-full bg-black/60 border border-white/10 text-white flex items-center justify-center text-[10px] hover:bg-black transition-colors z-20">
                  <i class="fa-solid fa-x"></i>
                </button>
              </div>
            `;
            topBanner.classList.remove('hidden');
          }

          // C. JIKA PENEMPATAN ADALAH INLINE CARD (MENYELIP DI TENGAH TAUTAN)
          else if (banner.Position === 'Inline_Card' && linksContainer) {
            const cardAd = document.createElement('div');
            cardAd.className = "w-full p-1 rounded-[28px] overflow-hidden shadow-lg relative group border transition-transform hover:scale-[1.015] active:scale-[0.985]";
            
            if (isDarkBg) {
              cardAd.style.backgroundColor = 'rgba(255, 255, 255, 0.04)';
              cardAd.style.borderColor = 'rgba(255, 255, 255, 0.08)';
            } else {
              cardAd.style.backgroundColor = 'rgba(255, 255, 255, 0.5)';
              cardAd.style.borderColor = 'rgba(255, 255, 255, 0.7)';
            }

            cardAd.innerHTML = `
              <a href="${banner.Destination_URL}" target="_blank" onclick="recordClick('${user.id}', '${banner.Banner_ID}')" class="block w-full h-full rounded-[24px] overflow-hidden">
                <img src="${banner.Image_URL}" class="w-full h-auto object-cover transition-transform duration-500 group-hover:scale-[1.02]">
              </a>
            `;
            // Sisipkan secara organik di bagian tengah / bawah barisan link biasa
            linksContainer.appendChild(cardAd);
          }

          // D. JIKA PENEMPATAN ADALAH FLOATING CARD (POP-UP DI SUDUT SEBELAH KANAN)
          else if (banner.Position === 'Floating_Card') {
            floatBanner.innerHTML = `
              <div class="relative w-full rounded-2xl overflow-hidden shadow-2xl border border-white/15 group">
                <a href="${banner.Destination_URL}" target="_blank" onclick="recordClick('${user.id}', '${banner.Banner_ID}')">
                  <img src="${banner.Image_URL}" class="w-full h-auto object-cover transition-transform duration-500 group-hover:scale-[1.03]">
                </a>
                <button onclick="document.getElementById('floatingBannerContainer').style.display='none'" class="absolute top-2 right-2 w-6 h-6 rounded-full bg-black/60 border border-white/10 text-white flex items-center justify-center text-[10px] hover:bg-black transition-colors z-20">
                  <i class="fa-solid fa-x"></i>
                </button>
              </div>
            `;
            floatBanner.classList.remove('hidden');
            setTimeout(() => {
              floatBanner.classList.remove('translate-y-10', 'opacity-0');
              floatBanner.classList.add('translate-y-0', 'opacity-100');
            }, 1000); // Muncul 1 detik setelah halaman termuat sempurna
          }

        });
      }
  // ========================================================
      // RENDERING KATALOG PRODUK DIGITAL (TEMPEL DI AKHIR renderPublicProfile)
      // ========================================================
      const productsContainer = document.getElementById('productsContainer');
      const productsSection = document.getElementById('productsSection');
      
      if (productsContainer && productsSection) {
        productsContainer.innerHTML = '';
        const PRODUCTS_DATA = data.products || [];

        if (PRODUCTS_DATA.length > 0) {
          productsSection.classList.remove('hidden');
          productsSection.classList.add('flex');

          PRODUCTS_DATA.forEach(prod => {
            if (!prod.Is_Active) return;

            const waText = encodeURIComponent(prod.WA_Message || `Halo, saya mau beli ${prod.Product_Name}`);
            const waLink = `https://wa.me/${prod.WA_Number}?text=${waText}`;

            const card = document.createElement('div');
            card.className = "w-full p-1 rounded-[28px] shadow-lg relative overflow-hidden group border";
            
            if (isDarkBg) {
              card.style.backgroundColor = 'rgba(255, 255, 255, 0.05)';
              card.style.borderColor = 'rgba(255, 255, 255, 0.1)';
            } else {
              card.style.backgroundColor = 'rgba(255, 255, 255, 0.6)';
              card.style.borderColor = 'rgba(255, 255, 255, 0.8)';
            }

            const imgUrl = prod.Product_Image || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400';

            card.innerHTML = `
              <div class="flex flex-col p-4">
                <div class="flex gap-4 items-start">
                  <img src="${imgUrl}" class="w-20 h-20 md:w-24 md:h-24 rounded-2xl object-cover shadow-md shrink-0 border border-white/10">
                  <div class="flex-1 min-w-0 text-left">
                    <h4 class="font-extrabold text-[15px] leading-tight" style="color: ${cardTextColor};">${prod.Product_Name}</h4>
                    <p class="text-[11px] mt-1.5 line-clamp-2 leading-relaxed" style="color: ${cardDescColor};">${prod.Product_Desc}</p>
                    <div class="mt-3 inline-block px-3 py-1 bg-emerald-500/10 border border-emerald-500/20 rounded-lg">
                      <!-- Menggunakan fungsi pemformatan rupiah lokal -->
                      <span class="text-emerald-500 font-black text-xs tracking-wide">
                        ${new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(prod.Product_Price)}
                      </span>
                    </div>
                  </div>
                </div>
                
                <!-- Tombol Beli via WhatsApp -->
                <a href="${waLink}" target="_blank" onclick="recordClick('${user.id}', '${prod.Product_ID}')" class="mt-4 w-full py-3.5 rounded-xl bg-[#25D366] hover:bg-[#20bd5a] text-white font-extrabold text-sm flex items-center justify-center gap-2 shadow-[0_4px_20px_rgba(37,211,102,0.3)] transition-all active:scale-95">
                  <i class="fa-brands fa-whatsapp text-lg"></i> Beli Sekarang
                </a>
              </div>
            `;
            productsContainer.appendChild(card);
          });
        } else {
          productsSection.classList.remove('flex');
          productsSection.classList.add('hidden');
        }
      }
    
    }
    
    // -> FUNGSI UNTUK MENCATAT KLIK SECARA SENYAP (DENGAN DEBUGLOG)
  // -> FUNGSI PENCATAT KLIK DENGAN TEKNIK IMAGE PIXEL TRACKING (100% ANTI-CORS)
   // -> FUNGSI PELACAK KLIK (METODE IMAGE BEACON - 100% AMAN & ANTI BLOKIR)
    function recordClick(userId, blockId) {
      try {
        const device = encodeURIComponent(navigator.userAgent.substring(0, 100));
        const ref = encodeURIComponent(document.referrer || 'Direct');
        
        // Membangun URL GET Request
        const trackingUrl = `${SCRIPT_URL}?action=log_click&userId=${userId}&blockId=${blockId}&device=${device}&referrer=${ref}`;
        
        // Metode Image Beacon: Membuat elemen gambar maya di latar belakang.
        // Browser TIDAK BISA membatalkan pemuatan gambar, sehingga log dijamin sampai ke server Google.
        const beacon = new Image();
        beacon.src = trackingUrl;
        
        console.log("Klik terdeteksi! Mengirim Beacon ke:", trackingUrl);
      } catch (e) {
        console.error("Gagal meluncurkan beacon analitik.", e);
      }
    }
    // FUNGSI SEARCH FILTERING
    function filterLinks(query) {
      const cleanQuery = query.toLowerCase().trim();
      const cards = document.querySelectorAll('#linksContainer a');
      
      cards.forEach(card => {
        const title = card.querySelector('h4').textContent.toLowerCase();
        const desc = card.querySelector('p').textContent.toLowerCase();
        
        if (title.includes(cleanQuery) || desc.includes(cleanQuery)) {
          card.style.display = 'flex';
        } else {
          card.style.display = 'none';
        }
      });
    }

    function loadGoogleFont(fontName) {
      if (!fontName) return;
      const id = 'gf-' + fontName.replace(/\s+/g, '-').toLowerCase();
      if (!document.getElementById(id)) {
        const link = document.createElement('link');
        link.id = id;
        link.rel = 'stylesheet';
        link.href = `https://fonts.googleapis.com/css2?family=${fontName.replace(/\s+/g, '+')}:wght@400;500;600;700;800&display=swap`;
        document.head.appendChild(link);
      }
    }

    function isColorDark(colorVal) {
      if (!colorVal) return false;
      let hex = colorVal;
      if (colorVal.includes('linear-gradient')) {
        const match = colorVal.match(/#([a-fA-F0-9]{6}|[a-fA-F0-9]{3})/);
        if (match) hex = match[0];
      }
      hex = hex.replace('#', '');
      const r = parseInt(hex.substr(0, 2), 16);
      const g = parseInt(hex.substr(2, 2), 16);
      const b = parseInt(hex.substr(4, 2), 16);
      const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
      return (yiq < 128);
    }

    function showErrorPage(message) {
      document.getElementById('profileLoader').style.display = 'none';
      document.body.innerHTML = `
