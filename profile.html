<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memuat Profil... | LinkHub</title>

  <!-- Google Fonts: Plus Jakarta Sans (Default) -->

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>

      background-color: #0f172a;

<body class="flex flex-col items-center px-5 pt-12 pb-6 min-h-screen transition-colors duration-500" id="mainContainer">
   <div id="topBannerContainer" class="w-full relative z-50 hidden transition-all duration-300">
     <!-- Diisi via JS -->
  </div>
  <!-- FULL PAGE LOADER -->
  <div id="profileLoader" class="fixed inset-0 bg-[#0f172a] z-50 flex flex-col items-center justify-center">
    <div class="w-12 h-12 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mb-4"></div>
    <p class="text-sm font-bold text-slate-400">Memuat halaman...</p>
  </div>

  <!-- MAIN PROFILE CARD WRAPPER -->
 <!-- MAIN PROFILE CARD WRAPPER (Diperlebar menjadi max-w-2xl agar lebih elegan & luas) -->
<!-- ======================================================== -->
  <!-- MAIN PROFILE CARD WRAPPER (STRUKTUR TERTATA & PRESISI)   -->
  <!-- ======================================================== -->
  <div class="w-full max-w-[480px] flex-1 flex flex-col items-center text-center">
    
    <!-- 1. Avatar dengan Drop Shadow Premium -->
    <div class="relative">
      <div class="absolute inset-0 rounded-full bg-black/10 blur-md transform translate-y-1"></div>
      <img id="profileAvatar" src="https://ui-avatars.com/api/?name=User&background=random" class="relative w-24 h-24 rounded-full object-cover border-2 border-white/80 shadow-md">
    </div>
    
    <!-- 2. Title & Bio -->
    <h1 id="profileTitle" class="mt-5 text-3xl font-black tracking-tight leading-tight">Nama Pengguna</h1>
    <p id="profileBio" class="mt-3 text-[15.5px] font-bold max-w-md opacity-85 leading-relaxed">Mendeskripsikan profil singkat di sini...</p>
    
    <!-- 3. iOS GLASS SEGMENTED CONTROL TAB SWITCHER -->
    <div class="w-full mt-6 p-1 bg-white/10 border border-white/10 rounded-2xl backdrop-blur-xl flex relative z-30 max-w-xs mx-auto shrink-0">
      <button onclick="switchPublicTab('links')" id="pubTabLinks" class="flex-1 py-2 rounded-xl text-xs font-extrabold text-white bg-white/20 shadow-md transition-all duration-300 flex items-center justify-center gap-1.5">
        <i class="fa-solid fa-link"></i> Tautan
      </button>
      <button onclick="switchPublicTab('ratecard')" id="pubTabRateCard" class="flex-1 py-2 rounded-xl text-xs font-extrabold text-white/60 hover:text-white transition-all duration-300 flex items-center justify-center gap-1.5">
        <i class="fa-solid fa-id-card-clip"></i> Rate Card
      </button>
    </div>

    <!-- ================================================================= -->
    <!-- 4. AREA TAUTAN & PRODUK (DIBUNGKUS DENGAN BENAR DI DALAM DIV INI) -->
    <!-- ================================================================= -->
    <div id="publicMainContent" class="w-full flex flex-col items-center">
      
      <!-- Search Bar Interaktif -->
      <div class="w-full mt-7 relative" id="searchBoxContainer">
        <input type="text" id="searchInput" oninput="filterLinks(this.value)" class="w-full bg-white/10 border border-white/10 rounded-2xl py-3.5 pl-12 pr-4 text-sm font-semibold placeholder-white/50 focus:outline-none focus:ring-1" placeholder="Cari link (misal: Youtube, Shop)...">
        <div class="absolute left-4.5 top-1/2 -translate-y-1/2 flex items-center justify-center pointer-events-none" id="searchIcon">
          <i class="fa-solid fa-magnifying-glass text-xs"></i>
        </div>
      </div>

      <!-- Container Button Links -->
      <div id="linksContainer" class="w-full mt-7 flex flex-col gap-4">
         <!-- Akan dirender via JS -->
      </div>

      <!-- Container Etalase Produk Digital -->
      <div id="productsSection" class="w-full mt-10 hidden flex-col items-center">
        <div class="flex items-center gap-3 mb-5">
          <div class="h-[1px] w-12 bg-white/20"></div>
          <span class="text-[10px] font-black tracking-[0.2em] uppercase text-white/50"><i class="fa-solid fa-store mr-1"></i> Etalase Produk</span>
          <div class="h-[1px] w-12 bg-white/20"></div>
        </div>
        <div id="productsContainer" class="w-full flex flex-col gap-5">
          <!-- Produk akan dirender di sini via JS -->
        </div>
      </div>

      <!-- Floating Social Bar (Mengikuti aliran halaman / auto-flow) -->
   <div id="floatingSocialBar" class="w-full mt-10 mb-4 hidden justify-center items-center z-30 transition-all duration-500 ease-out transform translate-y-4 opacity-0">
      <!-- inline-flex memaksa ukuran kapsul menciut pas mengikuti jumlah ikon di dalamnya -->
      <div class="inline-flex items-center justify-center gap-6 px-7 py-3 rounded-full border shadow-xl backdrop-blur-xl mx-auto" id="socialBarGlass">
        <!-- Ikon dirender via JS -->
      </div>
    </div>
    </div> <!-- PENUTUP publicMainContent YANG BENAR -->

    <!-- ================================================================= -->
    <!-- 5. AREA RATE CARD PUBLIK (TAMPIL HANYA SAAT TAB RATE CARD AKTIF)  -->
    <!-- ================================================================= -->
    <div id="publicRateCardSection" class="w-full mt-7 hidden flex-col space-y-6">
       <!-- Rate card dirender via JS di sini -->
    </div>

    <!-- 6. FOOTER BRANDING (LINKHUB) -->
    <div class="mt-auto pt-16 pb-4 relative z-30">
      <a href="#" class="text-[10px] font-black tracking-[0.25em] uppercase opacity-40 hover:opacity-80 transition-opacity" id="footerBranding">Powered by LinkHub.</a>
    </div>

  </div> <!-- Penutup MAIN PROFILE CARD WRAPPER -->

  <!-- JAVASCRIPT ENGINE -->
  <script>
    // MASUKKAN URL GOOGLE APPS SCRIPT WEB APP ANDA DI SINI
       const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz3KHDlJ-DfYxnKPyLFUdNa0-wuPH7yOwtOznD6r9jeJSJJ04l7w0fkARTrWrFFleHx/exec'; 

    let BLOCKS_DATA = [];

    document.addEventListener('DOMContentLoaded', () => {
      // Mengambil parameter username dari URL (Contoh: profile.html?u=business)
      const urlParams = new URLSearchParams(window.location.search);
      const username = urlParams.get('u');

      if (!username) {
        showErrorPage("Username tidak ditentukan.");
        return;
      }

      fetchUserProfile(username);
    });
// -> PENGENDALI ROTASI OTOMATIS BANNER HALAMAN PUBLIK (AUTO-SLIDE)
    let publicBannerInterval = null;
   function switchPublicTab(tab) {
      const mainContent = document.getElementById('publicMainContent');
      const rateSection = document.getElementById('publicRateCardSection');
      const btnLinks = document.getElementById('pubTabLinks');
      const btnRate = document.getElementById('pubTabRateCard');

      if (tab === 'links') {
        mainContent.classList.remove('hidden');
        mainContent.classList.add('flex');
        rateSection.classList.add('hidden');
        rateSection.classList.remove('flex');

        btnLinks.className = "flex-1 py-2 rounded-xl text-xs font-extrabold text-white bg-white/20 shadow-md transition-all duration-300 flex items-center justify-center gap-1.5";
        btnRate.className = "flex-1 py-2 rounded-xl text-xs font-extrabold text-white/60 hover:text-white transition-all duration-300 flex items-center justify-center gap-1.5";
      } else {
        mainContent.classList.add('hidden');
        mainContent.classList.remove('flex');
        rateSection.classList.remove('hidden');
        rateSection.classList.add('flex');

        btnRate.className = "flex-1 py-2 rounded-xl text-xs font-extrabold text-white bg-white/20 shadow-md transition-all duration-300 flex items-center justify-center gap-1.5";
        btnLinks.className = "flex-1 py-2 rounded-xl text-xs font-extrabold text-white/60 hover:text-white transition-all duration-300 flex items-center justify-center gap-1.5";
      }
    }
    function startPublicBannerSlider() {
      if (publicBannerInterval) clearInterval(publicBannerInterval);
      
      const slides = document.querySelectorAll('.public-top-slide');
      if (slides.length <= 1) {
        if (slides.length === 1) {
          slides[0].style.opacity = '1';
          slides[0].style.zIndex = '10';
        }
        return;
      }
      
      let currentIndex = 0;
      slides[currentIndex].style.opacity = '1';
      slides[currentIndex].style.zIndex = '10';
      
      publicBannerInterval = setInterval(() => {
        slides[currentIndex].style.opacity = '0';
        slides[currentIndex].style.zIndex = '1';
        
        currentIndex = (currentIndex + 1) % slides.length;
        
        slides[currentIndex].style.opacity = '1';
        slides[currentIndex].style.zIndex = '10';
      }, 4000); // Berputar otomatis setiap 4 detik
    }
    async function fetchUserProfile(username) {
      try {
        const payload = new URLSearchParams();
        payload.append('action', 'get_dashboard_data');
        payload.append('token', 'GUEST'); // Bypass token karena ini halaman publik
        payload.append('guestUsername', username); // Memberitahu backend username yang dicari

        // Note: Kita akan memanggil API get_dashboard_data dengan parameter username tamu
        const response = await fetch(`${SCRIPT_URL}?action=get_dashboard_data&u=${username}`);
        const res = await response.json();

        if (res.status === 'success') {
          BLOCKS_DATA = res.data.blocks;
          renderPublicProfile(res.data);
          document.getElementById('profileLoader').style.display = 'none';
        } else {
          throw new Error(res.message);
        }
      } catch (error) {
        showErrorPage("Halaman tidak ditemukan atau gagal memuat data.");
      }
    }
// (Letakkan fungsi ini di luar, atau di dalam script global)
      function formatRupiahProfile(angka) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
      }
// -> RENDER PROFIL PUBLIK (VERSI LENGKAP & INTEGRASI ANALYTICS)
    function renderPublicProfile(data) {
      const settings = data.pageSettings;
      const user = data.user;

      // Update Judul Halaman
      document.title = `${settings.Page_Title}`;

      // Update Teks & Bio
      document.getElementById('profileTitle').textContent = settings.Page_Title;
      document.getElementById('profileBio').textContent = settings.Bio_Description;

      // Update Foto Profil
      const avatarUrl = user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=random`;
      document.getElementById('profileAvatar').src = avatarUrl;

      // Update Latar Belakang (Solid / Gradasi)
      const mainContainer = document.getElementById('mainContainer');
      mainContainer.style.background = settings.Bg_Color;

      const isDarkBg = isColorDark(settings.Bg_Color);
      
      const titleColor = settings.Title_Color || (isDarkBg ? '#ffffff' : '#0f172a');
      const bioColor = settings.Bio_Color || (isDarkBg ? 'rgba(255,255,255,0.7)' : 'rgba(15,23,42,0.7)');

      document.getElementById('profileTitle').style.color = titleColor;
      document.getElementById('profileBio').style.color = bioColor;

      // Sinkronisasi Warna Search Bar & Ikon
      const searchInput = document.getElementById('searchInput');
      const searchIcon = document.getElementById('searchIcon');
      
      if (isDarkBg) {
        searchInput.className = "w-full bg-white/10 border border-white/10 rounded-2xl py-3.5 pl-11 pr-4 text-sm font-semibold text-white placeholder-white/50 focus:outline-none focus:ring-1 focus:ring-white/20 shadow-sm";
        searchIcon.className = "absolute left-4 top-1/2 -translate-y-1/2 flex items-center justify-center pointer-events-none text-white/50";
      } else {
        searchInput.className = "w-full bg-black/5 border border-black/10 rounded-2xl py-3.5 pl-11 pr-4 text-sm font-semibold text-slate-800 placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-black/20 shadow-sm";
        searchIcon.className = "absolute left-4 top-1/2 -translate-y-1/2 flex items-center justify-center pointer-events-none text-slate-500";
      }

      // Sinkronisasi Warna Branding Footer
      const footerBranding = document.getElementById('footerBranding');
      if (footerBranding) {
        footerBranding.style.color = isDarkBg ? 'rgba(255, 255, 255, 0.4)' : 'rgba(15, 23, 42, 0.4)';
      }

      // Load Google Fonts secara dinamis
      if (settings.Font_Family) {
        loadGoogleFont(settings.Font_Family);
        mainContainer.style.fontFamily = `"${settings.Font_Family}", sans-serif`;
      }

      // Rendering Glassmorphism Link Cards
      const container = document.getElementById('linksContainer');
      container.innerHTML = '';

      const cardTextColor = isDarkBg ? '#ffffff' : '#0f172a';
      const cardDescColor = isDarkBg ? 'rgba(255,255,255,0.6)' : 'rgba(15,23,42,0.6)';

      BLOCKS_DATA.forEach(block => {
        if (!block.Is_Active) return;

        const card = document.createElement('a');
        card.href = block.URL_Destination;
        card.target = "_blank";
        
        // SANGAT PENTING: Menambahkan kembali fungsi pelacak klik yang sempat terhapus
        // GANTI MENJADI (Native JS Binding):
card.onclick = (e) => {
  recordClick(user.id || '', block.Block_ID);
};
        card.className = `w-full flex items-center gap-4 p-3.5 border backdrop-blur-md shadow-sm transition-transform hover:scale-[1.015] active:scale-[0.985] group ${settings.Button_Style || 'rounded-full'}`;
        
        if (isDarkBg) {
          card.style.backgroundColor = 'rgba(255, 255, 255, 0.08)';
          card.style.borderColor = 'rgba(255, 255, 255, 0.12)';
        } else {
          card.style.backgroundColor = 'rgba(255, 255, 255, 0.6)';
          card.style.borderColor = 'rgba(255, 255, 255, 0.8)';
        }

        const imgUrl = block.Thumbnail_URL || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=100';

        card.innerHTML = `
          <img src="${imgUrl}" class="w-12 h-12 rounded-xl object-cover border border-white/20 shadow-sm shrink-0">
          <div class="flex-1 min-w-0 text-left">
            <h4 class="font-bold text-[15.5px] tracking-tight truncate" style="color: ${cardTextColor};">${block.Title}</h4>
            <p class="text-[12.5px] mt-1 leading-normal line-clamp-2 font-semibold" style="color: ${cardDescColor};">${block.Description || ''}</p>
          </div>
          <i class="fa-solid fa-chevron-right text-[11px] group-hover:translate-x-0.5 transition-transform shrink-0" style="color: ${cardTextColor}; opacity: 0.5;"></i>
        `;

        container.appendChild(card);
      });
    
      // ========================================================
      // RENDERING KATALOG PRODUK DIGITAL (DI DALAM renderPublicProfile)
      // ========================================================
      // RENDERING FLOATING SOCIAL ICONS BAR
      // ========================================================
      const socialBar = document.getElementById('floatingSocialBar');
      const socialGlass = document.getElementById('socialBarGlass');
      socialGlass.innerHTML = ''; // Reset kontainer
      
      const socColor = settings.Social_Color || '#ffffff';
      let socialCount = 0;

      // Fungsi Helper Pembuat Ikon
const createIcon = (url, iconClass) => {
        if (!url) return;
        socialCount++;
        const a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        // Efek perbesaran ikon saat kursor diarahkan (hover:scale-125)
        a.className = "flex items-center justify-center w-7 h-7 rounded-full hover:scale-125 active:scale-90 transition-transform duration-200 shrink-0";
        a.innerHTML = `<i class="fa-brands ${iconClass} text-[20px]" style="color: ${socColor}; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));"></i>`;
        socialGlass.appendChild(a);
      };
      // Buat ikon berdasarkan data dari database
      createIcon(settings.Social_Instagram, 'fa-instagram');
      createIcon(settings.Social_TikTok, 'fa-tiktok');
      createIcon(settings.Social_YouTube, 'fa-youtube');
      createIcon(settings.Social_Twitter, 'fa-twitter');
      createIcon(settings.Social_Facebook, 'fa-facebook');

      // Tampilkan bilah hanya jika minimal ada 1 link yang diisi
     if (socialCount > 0) {
          if (isDarkBg) {
            // Kaca gelap transparan super tipis
            socialGlass.style.backgroundColor = 'rgba(255, 255, 255, 0.07)';
            socialGlass.style.borderColor = 'rgba(255, 255, 255, 0.15)';
          } else {
            // Kaca terang transparan
            socialGlass.style.backgroundColor = 'rgba(255, 255, 255, 0.35)';
            socialGlass.style.borderColor = 'rgba(255, 255, 255, 0.6)';
          }
          socialBar.classList.remove('hidden');
        // Efek transisi masuk yang elegan (Slide Up & Fade In)
        setTimeout(() => {
          socialBar.classList.remove('translate-y-10', 'opacity-0');
          socialBar.classList.add('translate-y-0', 'opacity-100');
        }, 500);
      }
      // ========================================================
      // ========================================================
      // RENDERING ADVERTISING ENGINE (PROMO BANNERS)
      // ========================================================
      // === REVISI JALUR RENDERING BANNER DI HALAMAN PUBLIK ===
      const topBanner = document.getElementById('topBannerContainer');
      const floatBanner = document.getElementById('floatingBannerContainer');
      const linksContainer = document.getElementById('linksContainer');

      if (topBanner) topBanner.innerHTML = '';
      if (floatBanner) floatBanner.innerHTML = '';

      const BANNERS_DATA = data.banners || [];

      // 1. RENDERING TOP HEADER BANNER (SLIDER KELOMPOK & UKURAN RAMBING)
      const topHeaderBanners = BANNERS_DATA.filter(b => b.Position === 'Top_Header');
      
      if (topHeaderBanners.length > 0 && topBanner) {
        topBanner.innerHTML = '';
        // Tinggi dibatasi ramping (h-20 pada HP, h-24 pada Desktop) agar sangat estetik & proporsional
       topBanner.className = "w-full max-w-[480px] h-60 relative z-50 mb-8 shrink-0";
        
        const sliderInner = document.createElement('div');
        sliderInner.className = "relative w-full h-full rounded-2xl overflow-hidden shadow-lg border border-white/10 bg-black/10";
        
        topHeaderBanners.forEach((banner, idx) => {
          // Kirim log impresi view iklan via GET Image Beacon secara senyap
          const adBeacon = new Image();
          adBeacon.src = `${SCRIPT_URL}?action=log_banner_view&bannerId=${banner.Banner_ID}`;

          const slide = document.createElement('div');
          slide.className = "absolute inset-0 transition-opacity duration-500 ease-in-out opacity-0 public-top-slide";
          slide.style.zIndex = idx === 0 ? '10' : '1';
          
          slide.innerHTML = `
            <a href="${banner.Destination_URL}" target="_blank" onclick="recordClick('${user.id}', '${banner.Banner_ID}')" class="block w-full h-full">
              <img src="${banner.Image_URL}" class="w-full h-full object-cover">
            </a>
          `;
          sliderInner.appendChild(slide);
        });
        
        const closeBtn = document.createElement('button');
        closeBtn.className = "absolute top-2 right-2 w-6 h-6 rounded-full bg-black/60 border border-white/10 text-white flex items-center justify-center text-[10px] hover:bg-black transition-colors z-30 cursor-pointer";
        closeBtn.innerHTML = '<i class="fa-solid fa-x"></i>';
        closeBtn.onclick = (e) => {
          e.stopPropagation();
          topBanner.style.display = 'none';
        };
        
        topBanner.appendChild(sliderInner);
        topBanner.appendChild(closeBtn);
        topBanner.classList.remove('hidden');
        
        // Jalankan perputaran otomatis publik harian
        startPublicBannerSlider();
      } else {
        if (topBanner) topBanner.classList.add('hidden');
      }

      // 2. RENDERING UNTUK POSISI INLINE & FLOATING
      BANNERS_DATA.forEach(banner => {
        if (banner.Position === 'Top_Header') return; // Abaikan karena sudah diproses di atas

        // Kirim log impresi view iklan via GET Image Beacon secara senyap
        const adBeacon = new Image();
        adBeacon.src = `${SCRIPT_URL}?action=log_banner_view&bannerId=${banner.Banner_ID}`;

        // B. JIKA PENEMPATAN ADALAH INLINE CARD (MENYELIP DI TENGAH TAUTAN - COMPACT FORMAT)
        if (banner.Position === 'Inline_Card' && linksContainer) {
          const cardAd = document.createElement('div');
          // Tinggi dibatasi ramping (h-18 / 72px) agar proporsional layaknya papan spanduk digital
          cardAd.className = "w-full h-18 rounded-[28px] overflow-hidden shadow-lg relative group border transition-transform hover:scale-[1.015] active:scale-[0.985] p-0.5 shrink-0";
          
          if (isDarkBg) {
            cardAd.style.backgroundColor = 'rgba(255, 255, 255, 0.04)';
            cardAd.style.borderColor = 'rgba(255, 255, 255, 0.08)';
          } else {
            cardAd.style.backgroundColor = 'rgba(255, 255, 255, 0.5)';
            cardAd.style.borderColor = 'rgba(255, 255, 255, 0.7)';
          }

          cardAd.innerHTML = `
            <a href="${banner.Destination_URL}" target="_blank" onclick="recordClick('${user.id}', '${banner.Banner_ID}')" class="block w-full h-full rounded-[24px] overflow-hidden">
              <img src="${banner.Image_URL}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-[1.02]">
            </a>
          `;
          linksContainer.appendChild(cardAd);
        }

        // C. JIKA PENEMPATAN ADALAH FLOATING CARD (POP-UP MELAYANG KACA KRISTAL DI SUDUT SEBELAH KANAN)
        else if (banner.Position === 'Floating_Card' && floatBanner) {
          // Ukuran dibatasi sangat ramping agar proporsional di layar PC & ponsel
          floatBanner.className = "fixed bottom-24 right-4 md:right-8 z-40 w-36 md:w-44 rounded-2xl overflow-hidden shadow-2xl border backdrop-blur-xl transition-all duration-500 ease-out transform translate-y-10 opacity-0 pointer-events-none";
          
          if (isDarkBg) {
            floatBanner.style.backgroundColor = 'rgba(255, 255, 255, 0.07)';
            floatBanner.style.borderColor = 'rgba(255, 255, 255, 0.15)';
          } else {
            floatBanner.style.backgroundColor = 'rgba(255, 255, 255, 0.35)';
            floatBanner.style.borderColor = 'rgba(255, 255, 255, 0.6)';
          }

          floatBanner.innerHTML = `
            <div class="relative w-full h-full">
              <a href="${banner.Destination_URL}" target="_blank" onclick="recordClick('${user.id}', '${banner.Banner_ID}')" class="block w-full h-full">
                <img src="${banner.Image_URL}" class="w-full h-auto object-cover transition-transform duration-500 group-hover:scale-[1.03]">
              </a>
              <button onclick="document.getElementById('floatingBannerContainer').style.display='none'" class="absolute top-1.5 right-1.5 w-5 h-5 rounded-full bg-black/60 border border-white/10 text-white flex items-center justify-center text-[8px] hover:bg-black transition-colors z-20 pointer-events-auto cursor-pointer">
                <i class="fa-solid fa-x"></i>
              </button>
            </div>
          `;
          floatBanner.classList.remove('hidden');
          setTimeout(() => {
            floatBanner.classList.remove('translate-y-10', 'opacity-0');
            floatBanner.classList.add('translate-y-0', 'opacity-100');
          }, 1200); // Tampil lembut 1.2 detik setelah halaman termuat
        }

      });
      // ========================================================
      // RENDERING KATALOG PRODUK DIGITAL (TEMPEL DI AKHIR renderPublicProfile)
      // ========================================================
      const productsContainer = document.getElementById('productsContainer');
      const productsSection = document.getElementById('productsSection');
      
      if (productsContainer && productsSection) {
        productsContainer.innerHTML = '';
        const PRODUCTS_DATA = data.products || [];

        if (PRODUCTS_DATA.length > 0) {
          productsSection.classList.remove('hidden');
          productsSection.classList.add('flex');

          PRODUCTS_DATA.forEach(prod => {
            if (!prod.Is_Active) return;

            const waText = encodeURIComponent(prod.WA_Message || `Halo, saya mau beli ${prod.Product_Name}`);
            const waLink = `https://wa.me/${prod.WA_Number}?text=${waText}`;

            const card = document.createElement('div');

     const rateContainer = document.getElementById('publicRateCardSection');

    // -> FUNGSI UNTUK MENCATAT KLIK SECARA SENYAP (DENGAN DEBUGLOG)
  // -> FUNGSI PENCATAT KLIK DENGAN TEKNIK IMAGE PIXEL TRACKING (100% ANTI-CORS)
   // -> FUNGSI PELACAK KLIK (METODE IMAGE BEACON - 100% AMAN & ANTI BLOKIR)
    function recordClick(userId, blockId) {
      try {
        const device = encodeURIComponent(navigator.userAgent.substring(0, 100));
        const ref = encodeURIComponent(document.referrer || 'Direct');
        
        // Membangun URL GET Request
        const trackingUrl = `${SCRIPT_URL}?action=log_click&userId=${userId}&blockId=${blockId}&device=${device}&referrer=${ref}`;
        
        // Metode Image Beacon: Membuat elemen gambar maya di latar belakang.
        // Browser TIDAK BISA membatalkan pemuatan gambar, sehingga log dijamin sampai ke server Google.
        const beacon = new Image();
        beacon.src = trackingUrl;
        
        console.log("Klik terdeteksi! Mengirim Beacon ke:", trackingUrl);
      } catch (e) {
        console.error("Gagal meluncurkan beacon analitik.", e);
      }
    }
    // FUNGSI SEARCH FILTERING
    function filterLinks(query) {
      const cleanQuery = query.toLowerCase().trim();
      const cards = document.querySelectorAll('#linksContainer a');
      
      cards.forEach(card => {
        const title = card.querySelector('h4').textContent.toLowerCase();
        const desc = card.querySelector('p').textContent.toLowerCase();
        
        if (title.includes(cleanQuery) || desc.includes(cleanQuery)) {
          card.style.display = 'flex';
        } else {
          card.style.display = 'none';
        }
      });
    }

    function loadGoogleFont(fontName) {
      if (!fontName) return;
      const id = 'gf-' + fontName.replace(/\s+/g, '-').toLowerCase();
      if (!document.getElementById(id)) {
        const link = document.createElement('link');
        link.id = id;
        link.rel = 'stylesheet';
        link.href = `https://fonts.googleapis.com/css2?family=${fontName.replace(/\s+/g, '+')}:wght@400;500;600;700;800&display=swap`;
        document.head.appendChild(link);
      }
    }
// DEFINISI FUNGSI RENDER RATE CARD (Ditaruh di luar/di bawah renderPublicProfile)
    // DEFINISI FUNGSI RENDER RATE CARD
    // -> RENDER RATE CARD PUBLIK (ULTRA PREMIUM REDESIGN WITH AUTO-CHECKLIST)
    function renderPublicRateCard(data) {
      const rateContainer = document.getElementById('publicRateCardSection');
      if (!rateContainer) return;
      rateContainer.innerHTML = '';

      const stats = data.rateStats || {};
      const packages = data.ratePackages || [];
      const user = data.user || {};
      const settings = data.pageSettings || {};

      const isDarkBg = isColorDark(settings.Bg_Color);
      const cardTextColor = isDarkBg ? '#ffffff' : '#0f172a';
      const cardDescColor = isDarkBg ? 'rgba(255,255,255,0.7)' : 'rgba(15,23,42,0.7)';

      // Helper Pembersih & Pemformat Persentase (Otomatis konversi 0.6 -> 60%)
      const cleanPercent = (val, fallback) => {
        if (!val) return fallback;
        let str = String(val).trim();
        if (str.endsWith('%')) return str;
        let num = parseFloat(str);
        if (!isNaN(num)) {
          if (num <= 1) return Math.round(num * 100) + '%';
          return Math.round(num) + '%';
        }
        return fallback;
      };

      const femalePercent = cleanPercent(stats.Gender_Female, '50%');
      const malePercent = cleanPercent(stats.Gender_Male, '50%');
      
      // Pemformat ER Rate
      let erText = String(stats.Engagement_Rate || '0%').trim();
      if (!erText.endsWith('%') && !isNaN(parseFloat(erText))) {
        let num = parseFloat(erText);
        erText = (num <= 1 ? (num * 100).toFixed(1) : num) + '%';
      }

      // ========================================================
      // 1. RENDER KARTU DEMOGRAFI AUDIENS (AESTHETIC GLASS BOX)
      // ========================================================
      const statsBox = document.createElement('div');
      statsBox.className = "w-full p-6 rounded-[32px] border backdrop-blur-xl shadow-2xl space-y-5 relative overflow-hidden group";
      
      if (isDarkBg) {
        statsBox.style.backgroundColor = 'rgba(255, 255, 255, 0.05)';
        statsBox.style.borderColor = 'rgba(255, 255, 255, 0.12)';
      } else {
        statsBox.style.backgroundColor = 'rgba(255, 255, 255, 0.65)';
        statsBox.style.borderColor = 'rgba(255, 255, 255, 0.8)';
      }

      statsBox.innerHTML = `
        <!-- Header Demografi -->
        <div class="flex items-center justify-between">
          <span class="text-[10px] font-black tracking-[0.2em] uppercase text-violet-400 flex items-center gap-1.5">
            <i class="fa-solid fa-chart-pie"></i> Demografi Audiens
          </span>
          <span class="text-[10px] font-extrabold px-3 py-1 rounded-full bg-violet-500/10 border border-violet-500/20 text-violet-300">
            ${stats.Platform || 'Social Media'}
          </span>
        </div>

        <!-- Metric Cards Grid -->
        <div class="grid grid-cols-2 gap-3 text-center">
          <div class="p-3.5 bg-black/10 rounded-2xl border border-white/10 shadow-inner">
            <p class="text-[9px] font-black uppercase tracking-widest opacity-60" style="color: ${cardTextColor};">Followers</p>
            <p class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-purple-400 mt-1">${stats.Followers || '0'}</p>
          </div>
          <div class="p-3.5 bg-black/10 rounded-2xl border border-white/10 shadow-inner">
            <p class="text-[9px] font-black uppercase tracking-widest opacity-60" style="color: ${cardTextColor};">Engagement Rate</p>
            <p class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-rose-400 mt-1">${erText}</p>
          </div>
        </div>

        <!-- Progress Bar Demografi Gender -->
        <div class="space-y-2 pt-1">
          <div class="flex justify-between text-[11px] font-bold">
            <span class="text-pink-400 flex items-center gap-1.5"><i class="fa-solid fa-venus"></i> Wanita ${femalePercent}</span>
            <span class="text-blue-400 flex items-center gap-1.5">Pria ${malePercent} <i class="fa-solid fa-mars"></i></span>
          </div>
          <div class="w-full h-3 bg-blue-500/30 rounded-full overflow-hidden flex p-0.5 border border-white/10 shadow-inner">
            <div class="h-full bg-gradient-to-r from-pink-500 to-rose-500 rounded-full transition-all duration-700 shadow-md" style="width: ${femalePercent}"></div>
          </div>
        </div>

        <!-- Detail Usia & Lokasi -->
        <div class="flex items-center justify-between text-[11.5px] font-bold pt-3 border-t border-white/10">
          <span style="color: ${cardTextColor};" class="opacity-80"><i class="fa-solid fa-users text-xs mr-1.5 text-violet-400"></i> Usia: <strong class="text-violet-400">${stats.Top_Age_Group || '18-24'}</strong></span>
          <span style="color: ${cardTextColor};" class="opacity-80"><i class="fa-solid fa-location-dot text-xs mr-1.5 text-rose-400"></i> <strong class="text-rose-400">${stats.Top_Location || 'Indonesia'}</strong></span>
        </div>
      `;
      rateContainer.appendChild(statsBox);

      // ========================================================
      // 2. RENDER PAKET KOLABORASI (DENGAN LIST CHECKMARK REKURSIF)
      // ========================================================
      if (packages.length > 0) {
        packages.forEach(pkg => {
          const card = document.createElement('div');
          card.className = "w-full p-6 rounded-[32px] border backdrop-blur-xl shadow-2xl relative flex flex-col text-left group transition-all duration-300 hover:scale-[1.01]";

            card.style.borderColor = 'rgba(255, 255, 255, 0.12)';

            card.style.backgroundColor = 'rgba(255, 255, 255, 0.65)';
            card.style.borderColor = 'rgba(255, 255, 255, 0.8)';
          }

          // Format WhatsApp Link
          const waMessage = encodeURIComponent(`Halo Kak ${user.name}, saya tertarik mengajukan kerja sama untuk paket Rate Card: *${pkg.Package_Name}* (${formatRupiahProfile(pkg.Package_Price)}). Mohon info jadwal ketersediaannya ya kak. Terima kasih!`);
          const waLink = `https://wa.me/${settings.Social_WhatsApp || '628123456789'}?text=${waMessage}`;

          // Memecah Teks Deliverables Menjadi List Poin-poin Bercentang Hijau

                  <span>${escapeHtml(item)}</span>

            deliverablesHTML += `</ul>`;
          } else {
            deliverablesHTML = `<p class="text-xs mt-3 leading-relaxed font-medium" style="color: ${cardDescColor};">${escapeHtml(rawDeliverables)}</p>`;
          }

          card.innerHTML = `
            <!-- Judul & Badge Harga -->
            <div class="flex justify-between items-start gap-3">

            <!-- List Poin Deliverables -->

            <!-- Bottom Row: Estimasi Reach & Tombol Ajukan -->

                <i class="fa-solid fa-bolt text-xs"></i> Est. Reach: <strong class="text-white">${escapeHtml(pkg.Est_Reach || 'N/A')}</strong>
              </span>
              <a href="${waLink}" target="_blank" onclick="recordClick('${user.id}', '${pkg.Package_ID}')" class="w-full sm:w-auto px-5 py-3 bg-gradient-to-r from-violet-600 via-purple-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 text-white font-extrabold text-xs rounded-2xl shadow-[0_4px_20px_rgba(139,92,246,0.3)] transition-all active:scale-95 flex items-center justify-center gap-2 tracking-wide uppercase">

              </a>
            </div>
          `;
          rateContainer.appendChild(card);
        });
      }
    }
    function isColorDark(colorVal) {
      if (!colorVal) return false;
      let hex = colorVal;
      if (colorVal.includes('linear-gradient')) {
        const match = colorVal.match(/#([a-fA-F0-9]{6}|[a-fA-F0-9]{3})/);
        if (match) hex = match[0];
      }
      hex = hex.replace('#', '');
      const r = parseInt(hex.substr(0, 2), 16);
      const g = parseInt(hex.substr(2, 2), 16);
      const b = parseInt(hex.substr(4, 2), 16);
      const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
      return (yiq < 128);
    }
    function escapeHtml(val) {
      return String(val || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
    function showErrorPage(message) {
      document.getElementById('profileLoader').style.display = 'none';
      document.body.innerHTML = `
        <div class="min-h-screen flex flex-col items-center justify-center text-center p-6">
          <i class="fa-solid fa-triangle-exclamation text-red-500 text-5xl mb-4"></i>
          <h1 class="text-xl font-bold text-white">Profil Tidak Ditemukan</h1>
          <p class="text-sm text-slate-400 mt-2">${message}</p>
        </div>
      `;
    }
